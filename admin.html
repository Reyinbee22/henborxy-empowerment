<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HENBORYX Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a5f3f;
            --primary-light: #2d8a5e;
            --secondary: #f4a261;
            --accent: #e76f51;
            --dark: #264653;
            --light: #f8f9fa;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
            --shadow-hover: 0 20px 40px rgba(0,0,0,0.15);
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-box {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: var(--shadow-hover);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-box h2 {
            color: var(--dark);
            margin-bottom: 30px;
            font-size: 1.8rem;
        }
        .login-box i {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26, 95, 63, 0.4);
        }
        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9rem;
        }

        /* Admin Dashboard Styles */
        .admin-nav {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-nav .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .admin-nav .logo i {
            color: var(--secondary);
        }
        .admin-nav .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .admin-badge {
            background: linear-gradient(135deg, var(--accent) 0%, #c0392b 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .logout-btn {
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
            padding: 8px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .logout-btn:hover {
            background: var(--accent);
            color: white;
        }

        .dashboard {
            padding: 100px 30px 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            text-align: center;
        }
        .stat-card i {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 10px;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--dark);
        }
        .stat-label {
            color: #888;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .filters-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .filter-group label {
            font-size: 0.85rem;
            color: #666;
            font-weight: 500;
        }
        .filter-group input,
        .filter-group select {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
        }
        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: var(--primary);
        }
        .btn-filter {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 20px;
        }
        .btn-filter:hover {
            background: var(--primary-light);
        }
        .btn-export {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 20px;
            margin-left: auto;
        }
        .btn-export:hover {
            background: #e65100;
        }

        .users-table-container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            overflow-x: auto;
        }
        .users-table-container h3 {
            color: var(--dark);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
        }
        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 0.9rem;
        }
        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            font-size: 0.9rem;
        }
        tr:hover {
            background: #f8f9fa;
        }
        .stage-badge {
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .stage-new { background: #e0e0e0; color: #666; }
        .stage-starter { background: #e3f2fd; color: #1976d2; }
        .stage-1 { background: #e8f5e9; color: #388e3c; }
        .stage-2 { background: #fff3e0; color: #f57c00; }
        .stage-3 { background: #fce4ec; color: #c2185b; }
        .stage-4 { background: #f3e5f5; color: #7b1fa2; }
        .stage-5 { background: #e0f2f1; color: #00796b; }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-details h4 {
            color: var(--dark);
            font-size: 0.95rem;
            margin-bottom: 3px;
        }
        .user-details p {
            color: #888;
            font-size: 0.8rem;
        }

        .network-info {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
        }
        .network-stat {
            background: #f5f5f5;
            padding: 5px 12px;
            border-radius: 20px;
        }
        .network-stat i {
            color: var(--primary);
            margin-right: 5px;
        }

        .payment-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .status-paid { background: #e8f5e9; color: #2e7d32; }
        .status-pending { background: #fff3e0; color: #ef6c00; }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 25px;
        }
        .page-btn {
            padding: 8px 15px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        .page-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .page-btn:hover:not(.active) {
            border-color: var(--primary);
            color: var(--primary);
        }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        .no-data i {
            font-size: 4rem;
            margin-bottom: 20px;
            color: #ddd;
        }

        @media (max-width: 768px) {
            .dashboard {
                padding: 100px 15px 20px;
            }
            .filters-section {
                flex-direction: column;
                align-items: stretch;
            }
            .btn-export {
                margin-left: 0;
                width: 100%;
            }
            table {
                font-size: 0.8rem;
            }
            th, td {
                padding: 10px;
            }
            .network-info {
                flex-direction: column;
                gap: 5px;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <i class="fas fa-shield-alt"></i>
            <h2>Admin Login</h2>
            <div class="error-message" id="loginError"></div>
            <form id="adminLoginForm" onsubmit="handleAdminLogin(event)">
                <div class="form-group">
                    <label><i class="fas fa-user-shield"></i> Admin Username</label>
                    <input type="text" id="adminUsername" required placeholder="Enter admin username">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="adminPassword" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-sign-in-alt"></i> Login to Dashboard
                </button>
            </form>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="adminDashboard" style="display: none;">
        <nav class="admin-nav">
            <div class="logo">
                <i class="fas fa-hands-holding-circle"></i>
                HENBORYX Admin
            </div>
            <div class="nav-right">
                <span class="admin-badge"><i class="fas fa-crown"></i> Administrator</span>
                <button class="logout-btn" onclick="adminLogout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </nav>

        <div class="dashboard">
            <!-- Stats Overview -->
            <div class="stats-overview">
                <div class="stat-card">
                    <i class="fas fa-users"></i>
                    <div class="stat-number" id="totalUsers">0</div>
                    <div class="stat-label">Total Users</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-user-plus"></i>
                    <div class="stat-number" id="todayRegistrations">0</div>
                    <div class="stat-label">Today's Registrations</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-layer-group"></i>
                    <div class="stat-number" id="stage5Count">0</div>
                    <div class="stat-label">Stage 5 Members</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-money-bill-wave"></i>
                    <div class="stat-number" id="totalRevenue">₦0</div>
                    <div class="stat-label">Total Revenue</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-sitemap"></i>
                    <div class="stat-number" id="avgNetworkSize">0</div>
                    <div class="stat-label">Avg Network Size</div>
                </div>
            </div>

            <!-- Filters -->
            <div class="filters-section">
                <div class="filter-group">
                    <label>Search by Name/Email</label>
                    <input type="text" id="searchInput" placeholder="Search users..." onkeyup="filterUsers()">
                </div>
                <div class="filter-group">
                    <label>Filter by Stage</label>
                    <select id="stageFilter" onchange="filterUsers()">
                        <option value="all">All Stages</option>
                        <option value="-1">New Members</option>
                        <option value="0">Starter</option>
                        <option value="1">Stage 1</option>
                        <option value="2">Stage 2</option>
                        <option value="3">Stage 3</option>
                        <option value="4">Stage 4</option>
                        <option value="5">Stage 5</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Sort By</label>
                    <select id="sortBy" onchange="filterUsers()">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                        <option value="stage-high">Highest Stage</option>
                        <option value="stage-low">Lowest Stage</option>
                        <option value="network-large">Largest Network</option>
                    </select>
                </div>
                <button class="btn-export" onclick="exportToCSV()">
                    <i class="fas fa-download"></i> Export to CSV
                </button>
            </div>

            <!-- Users Table -->
            <div class="users-table-container">
                <h3><i class="fas fa-list"></i> Registered Users</h3>
                <div id="usersTableWrapper">
                    <table id="usersTable">
                        <thead>
                            <tr>
                                <th>User</th>
                                <th>Contact</th>
                                <th>Stage</th>
                                <th>Network Size</th>
                                <th>Direct Referrals</th>
                                <th>Payment</th>
                                <th>Joined Date</th>
                                <th>Referrer</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <!-- Users will be loaded here -->
                        </tbody>
                    </table>
                </div>
                <div class="pagination" id="pagination">
                    <!-- Pagination buttons -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Admin credentials (in production, this should be server-side)
        const ADMIN_USERNAME = 'admin';
        const ADMIN_PASSWORD = 'henboryx2024';

        // Data from main site
        let users = JSON.parse(localStorage.getItem('henboryx_users')) || [];
        let referrals = JSON.parse(localStorage.getItem('henboryx_referrals')) || {};

        let currentPage = 1;
        let itemsPerPage = 10;
        let filteredUsers = [];

        // Stage configuration
        const stages = [
            { level: -1, name: 'New Member', required: 0 },
            { level: 0, name: 'Starter', required: 6 },
            { level: 1, name: 'Stage 1', required: 36 },
            { level: 2, name: 'Stage 2', required: 216 },
            { level: 3, name: 'Stage 3', required: 1296 },
            { level: 4, name: 'Stage 4', required: 7776 },
            { level: 5, name: 'Stage 5', required: 46656 }
        ];

        // Check if already logged in
        document.addEventListener('DOMContentLoaded', function() {
            const adminSession = sessionStorage.getItem('henboryx_admin');
            if (adminSession) {
                showDashboard();
            }
        });

        function handleAdminLogin(e) {
            e.preventDefault();
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;

            if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                sessionStorage.setItem('henboryx_admin', 'true');
                showDashboard();
            } else {
                const errorDiv = document.getElementById('loginError');
                errorDiv.textContent = 'Invalid username or password';
                errorDiv.style.display = 'block';
                setTimeout(() => errorDiv.style.display = 'none', 3000);
            }
        }

        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'block';
            loadDashboardData();
        }

        function adminLogout() {
            sessionStorage.removeItem('henboryx_admin');
            document.getElementById('adminDashboard').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('adminUsername').value = '';
            document.getElementById('adminPassword').value = '';
        }

        function loadDashboardData() {
            // Refresh data
            users = JSON.parse(localStorage.getItem('henboryx_users')) || [];
            referrals = JSON.parse(localStorage.getItem('henboryx_referrals')) || {};

            updateStatsOverview();
            filterUsers();
        }

        function updateStatsOverview() {
            // Total users
            document.getElementById('totalUsers').textContent = users.length;

            // Today's registrations
            const today = new Date().toDateString();
            const todayCount = users.filter(u => new Date(u.joinedDate).toDateString() === today).length;
            document.getElementById('todayRegistrations').textContent = todayCount;

            // Stage 5 count
            const stage5Count = users.filter(u => u.stage === 5).length;
            document.getElementById('stage5Count').textContent = stage5Count;

            // Total revenue
            const totalRevenue = users.reduce((sum, u) => sum + (u.paymentAmount || 0), 0);
            document.getElementById('totalRevenue').textContent = '₦' + totalRevenue.toLocaleString();

            // Average network size
            let totalNetwork = 0;
            users.forEach(u => {
                totalNetwork += calculateTotalNetwork(u.referralCode);
            });
            const avgNetwork = users.length > 0 ? Math.round(totalNetwork / users.length) : 0;
            document.getElementById('avgNetworkSize').textContent = avgNetwork;
        }

        function calculateTotalNetwork(userCode, visited = new Set()) {
            if (visited.has(userCode)) return 0;
            visited.add(userCode);

            const directReferrals = referrals[userCode] || [];
            let total = directReferrals.length;

            for (const ref of directReferrals) {
                const refUser = users.find(u => u.email === ref.email);
                if (refUser) {
                    total += calculateTotalNetwork(refUser.referralCode, visited);
                }
            }

            return total;
        }

        function getStageBadge(stage) {
            const stageNames = {
                '-1': 'New',
                '0': 'Starter',
                '1': 'Stage 1',
                '2': 'Stage 2',
                '3': 'Stage 3',
                '4': 'Stage 4',
                '5': 'Stage 5'
            };

            const stageClasses = {
                '-1': 'stage-new',
                '0': 'stage-starter',
                '1': 'stage-1',
                '2': 'stage-2',
                '3': 'stage-3',
                '4': 'stage-4',
                '5': 'stage-5'
            };

            const stageNum = stage !== undefined ? stage : -1;
            return `<span class="stage-badge ${stageClasses[stageNum]}">${stageNames[stageNum]}</span>`;
        }

        function filterUsers() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const stageFilter = document.getElementById('stageFilter').value;
            const sortBy = document.getElementById('sortBy').value;

            // Filter
            filteredUsers = users.filter(user => {
                const matchesSearch = user.name.toLowerCase().includes(searchTerm) || 
                                     user.email.toLowerCase().includes(searchTerm) ||
                                     user.phone?.includes(searchTerm);

                const userStage = user.stage !== undefined ? user.stage : -1;
                const matchesStage = stageFilter === 'all' || userStage.toString() === stageFilter;

                return matchesSearch && matchesStage;
            });

            // Sort
            filteredUsers.sort((a, b) => {
                switch(sortBy) {
                    case 'newest':
                        return new Date(b.joinedDate) - new Date(a.joinedDate);
                    case 'oldest':
                        return new Date(a.joinedDate) - new Date(b.joinedDate);
                    case 'stage-high':
                        return (b.stage || -1) - (a.stage || -1);
                    case 'stage-low':
                        return (a.stage || -1) - (b.stage || -1);
                    case 'network-large':
                        return calculateTotalNetwork(b.referralCode) - calculateTotalNetwork(a.referralCode);
                    default:
                        return 0;
                }
            });

            currentPage = 1;
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('usersTableBody');
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageUsers = filteredUsers.slice(start, end);

            if (pageUsers.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8">
                            <div class="no-data">
                                <i class="fas fa-inbox"></i>
                                <p>No users found</p>
                            </div>
                        </td>
                    </tr>
                `;
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            let html = '';
            pageUsers.forEach(user => {
                const initials = user.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                const networkSize = calculateTotalNetwork(user.referralCode);
                const directCount = (referrals[user.referralCode] || []).length;
                const joinDate = new Date(user.joinedDate).toLocaleDateString();
                const referrer = user.referrer ? user.referrer : 'None';

                html += `
                    <tr>
                        <td>
                            <div class="user-info">
                                <div class="user-avatar">${initials}</div>
                                <div class="user-details">
                                    <h4>${user.name}</h4>
                                    <p>ID: ${user.referralCode}</p>
                                </div>
                            </div>
                        </td>
                        <td>
                            <div class="user-details">
                                <p><i class="fas fa-envelope" style="color: var(--primary);"></i> ${user.email}</p>
                                <p><i class="fas fa-phone" style="color: var(--primary);"></i> ${user.phone || 'N/A'}</p>
                            </div>
                        </td>
                        <td>${getStageBadge(user.stage)}</td>
                        <td>
                            <div class="network-info">
                                <span class="network-stat"><i class="fas fa-users"></i> ${networkSize}</span>
                            </div>
                        </td>
                        <td>${directCount}/2</td>
                        <td>
                            <span class="payment-status ${user.paymentStatus === 'paid' ? 'status-paid' : 'status-pending'}">
                                <i class="fas fa-${user.paymentStatus === 'paid' ? 'check' : 'clock'}"></i>
                                ${user.paymentStatus === 'paid' ? 'Paid' : 'Pending'}
                            </span>
                        </td>
                        <td>${joinDate}</td>
                        <td>${referrer !== 'None' ? `<span style="color: var(--primary); font-weight: 600;">${referrer}</span>` : '<span style="color: #999;">Direct Signup</span>'}</td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredUsers.length / itemsPerPage);
            const paginationDiv = document.getElementById('pagination');

            if (totalPages <= 1) {
                paginationDiv.innerHTML = '';
                return;
            }

            let html = '';

            // Previous button
            html += `<button class="page-btn ${currentPage === 1 ? 'disabled' : ''}" onclick="goToPage(${currentPage - 1})"><i class="fas fa-chevron-left"></i></button>`;

            // Page numbers
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    html += `<span style="padding: 8px;">...</span>`;
                }
            }

            // Next button
            html += `<button class="page-btn ${currentPage === totalPages ? 'disabled' : ''}" onclick="goToPage(${currentPage + 1})"><i class="fas fa-chevron-right"></i></button>`;

            paginationDiv.innerHTML = html;
        }

        function goToPage(page) {
            const totalPages = Math.ceil(filteredUsers.length / itemsPerPage);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderTable();
        }

        function exportToCSV() {
            const headers = ['Name', 'Email', 'Phone', 'Referral Code', 'Stage', 'Network Size', 'Direct Referrals', 'Payment Status', 'Payment Reference', 'Joined Date', 'Referrer'];

            let csvContent = headers.join(',') + '\n';

            filteredUsers.forEach(user => {
                const networkSize = calculateTotalNetwork(user.referralCode);
                const directCount = (referrals[user.referralCode] || []).length;
                const stageName = stages.find(s => s.level === (user.stage || -1))?.name || 'New';

                const row = [
                    `"${user.name}"`,
                    user.email,
                    user.phone || '',
                    user.referralCode,
                    stageName,
                    networkSize,
                    directCount,
                    user.paymentStatus || 'pending',
                    user.paymentReference || '',
                    new Date(user.joinedDate).toLocaleDateString(),
                    user.referrer || 'None'
                ];

                csvContent += row.join(',') + '\n';
            });

            const blob = new Blob([csvContent], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `henboryx_users_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }

        // Auto refresh every 30 seconds
        setInterval(() => {
            if (sessionStorage.getItem('henboryx_admin')) {
                users = JSON.parse(localStorage.getItem('henboryx_users')) || [];
                referrals = JSON.parse(localStorage.getItem('henboryx_referrals')) || {};
                updateStatsOverview();
                renderTable();
            }
        }, 30000);
    </script>
</body>
